apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-express
  namespace: nodejs-express
  labels:
    app: nodejs-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-express
  template:
    metadata:
      labels:
        app: nodejs-express
    spec:
      containers:
      - name: nodejs-express
        image: nodejs-express
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
      restartPolicy: Always
